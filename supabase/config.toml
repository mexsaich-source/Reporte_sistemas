
[functions.notify-omnicanal]
enabled = true
verify_jwt = true
import_map = "./functions/notify-omnicanal/deno.json"
# Uncomment to specify a custom file path to the entrypoint.
# Supported file extensions are: .ts, .js, .mjs, .jsx, .tsx
entrypoint = "./functions/notify-omnicanal/index.ts"
# Specifies static files to be bundled with the function. Supports glob patterns.
# For example, if you want to serve static HTML pages in your function:
# static_files = [ "./functions/notify-omnicanal/*.html" ]

[functions.chat-assistant]
enabled = true
verify_jwt = false
entrypoint = "./functions/chat-assistant/index.ts"

[functions.send-fcm-push]
enabled = true
verify_jwt = false
entrypoint = "./functions/send-fcm-push/index.ts"

[functions.send-password-email]
enabled = true
verify_jwt = false
entrypoint = "./functions/send-password-email/index.ts"
